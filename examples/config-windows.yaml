# ============================================================
# TapCraft — Windows Example Config
# ============================================================
# Copy this file to config.yaml to use it:
#   copy examples\config-windows.yaml config.yaml
#
# HOW IT WORKS ON WINDOWS:
#   Your screen is split into a 3x3 grid.
#   Click/tap in different screen areas to trigger zone actions.
#   Or use hotkeys: Ctrl+Alt+Numpad 1-9
#     7=top-left  8=top-mid  9=top-right
#     4=mid-left  5=center   6=mid-right
#     1=bot-left  2=bot-mid  3=bot-right
#   Right-click = two-finger, Middle-click = three-finger
#
# For slap detection via microphone:
#   pip install sounddevice numpy --only-binary=:all:
#   python tapcraft.py --slap-only --slap-method mic
# ============================================================

settings:
  tap_timeout_ms: 300
  zone_padding: 0.05
  feedback: true
  log_taps: false

slap:
  enabled: false       # Set true after: pip install sounddevice numpy --only-binary=:all:
  method: microphone
  microphone:
    threshold: 0.3
    spike_ratio: 4.0
  cooldown_ms: 750
  mappings:
    any:
      action: notify
      value: "Slap detected!"
      label: "Slap"
    hard:
      action: command
      value: "start cmd"
      label: "Hard Slap - CMD"
    brutal:
      action: notify
      value: "STOP HITTING ME!"
      label: "Brutal"
  escalation:
    enabled: false
    window_minutes: 5
    levels:
      - count: 5
        action: notify
        value: "Getting warmer..."
        label: "Level 2"

mappings:
  top-left:
    double:
      action: command
      value: "start cmd"
      label: "Open CMD"

  top-mid:
    double:
      action: notify
      value: "TapCraft says hello!"
      label: "Hello"

  top-right:
    double:
      action: command
      value: "start notepad"
      label: "Open Notepad"

  mid-left:
    two-finger:
      action: media
      value: "prev"
      label: "Previous Track"

  center:
    two-finger:
      action: media
      value: "play-pause"
      label: "Play / Pause"
    triple:
      action: notify
      value: "TapCraft is alive!"
      label: "Status Check"

  mid-right:
    two-finger:
      action: media
      value: "next"
      label: "Next Track"

  bot-left:
    double:
      action: command
      value: "start explorer"
      label: "Open File Explorer"

  bot-mid:
    three-finger:
      action: clipboard
      value: "paste-plain"
      label: "Paste as Plain Text"

  bot-right:
    double:
      action: command
      value: "start taskmgr"
      label: "Task Manager"
