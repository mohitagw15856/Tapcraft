name: Build Standalone Executables

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: TapCraft-Windows
            ext: .exe
          - os: macos-latest
            artifact: TapCraft-macOS
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyyaml pynput

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name TapCraft --add-data "config.yaml:." --add-data "sounds:sounds" --add-data "tapcraft:tapcraft" --add-data "plugins:plugins" --add-data "examples:examples" tapcraft_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/TapCraft${{ matrix.ext }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TapCraft${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
