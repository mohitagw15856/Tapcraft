# ============================================================
# TapCraft Configuration
# ============================================================
# Works on macOS, Windows, and Linux — no edits needed!
#
# FIRST TIME? Run with --log to see what's happening:
#   python tapcraft.py --log
#
# HOW INPUT WORKS PER PLATFORM:
#   macOS   → trackpad multi-touch (best experience)
#   Windows → screen divided into 3x3 grid + hotkeys Ctrl+Alt+Numpad 1-9
#   Linux   → trackpad via evdev
#
# ZONES (3x3 grid):
#   top-left,  top-mid,  top-right
#   mid-left,  center,   mid-right
#   bot-left,  bot-mid,  bot-right
#
# GESTURES:
#   single, double, triple, two-finger, three-finger
#
# ACTIONS:
#   notify     — show a desktop notification (works everywhere)
#   open-app   — launch an app by name (cross-platform, see below)
#   command    — run a shell command (platform-specific! see note below)
#   sound      — play a .wav/.mp3 file
#   type-text  — type text at cursor position
#   media      — media keys: play-pause, next, prev, vol-up, vol-down
#   clipboard  — clipboard tools: paste-plain, copy-line
#   script     — run a Python plugin
#
# ============================================================
# ABOUT THE "command" vs "open-app" ACTION:
#
# "open-app" is CROSS-PLATFORM — it opens apps by name:
#   macOS:   uses "open -a <name>" internally
#   Windows: uses "start <name>" internally
#   Linux:   launches the binary directly
#
# "command" runs a RAW SHELL COMMAND — it is platform-specific!
#   If you use "command", you must use the right syntax:
#   macOS:   open -a 'Terminal'
#   Windows: start cmd
#   Linux:   gnome-terminal
#
# TIP: Prefer "notify" and "open-app" for cross-platform configs.
#      Use "command" only when you need something platform-specific.
# ============================================================

settings:
  tap_timeout_ms: 300
  zone_padding: 0.05
  feedback: true
  log_taps: false     # Set to true for debugging

# ============================================================
# Slap / Hit Detection (inspired by taigrr/spank)
# ============================================================
# macOS Apple Silicon (M2+): uses accelerometer (run with sudo)
# Windows / Linux: uses microphone (pip install sounddevice numpy)

slap:
  enabled: false      # Set to true after reading platform notes above
  method: auto
  accelerometer:
    min_amplitude: 0.15
  microphone:
    threshold: 0.3
    spike_ratio: 4.0
  cooldown_ms: 750
  mappings:
    any:
      action: notify
      value: "Slap detected!"
      label: "Slap"
    light:
      action: notify
      value: "Hey, that tickles!"
      label: "Light Tap"
    medium:
      action: notify
      value: "Ok I felt that."
      label: "Medium Hit"
    hard:
      action: notify
      value: "OW! That hurt!"
      label: "Hard Slap"
    brutal:
      action: notify
      value: "STOP HITTING ME!"
      label: "Brutal Hit"
  escalation:
    enabled: false
    window_minutes: 5
    levels:
      - count: 1
        action: notify
        value: "First slap registered."
        label: "Level 1"
      - count: 5
        action: notify
        value: "Getting warmer..."
        label: "Level 2"
      - count: 10
        action: notify
        value: "You really can't stop, can you?"
        label: "Level 3"

# ============================================================
# Tap-to-Action Mappings
# ============================================================
# These all use "notify" and "open-app" so they work on ANY platform.
# Customize to your liking!
# ============================================================

mappings:

  # --- Top Row ---

  top-left:
    double:
      action: notify
      value: "Top-left double tap!"
      label: "Top-Left Alert"

  top-mid:
    double:
      action: notify
      value: "TapCraft says hello!"
      label: "Hello"

  top-right:
    double:
      action: notify
      value: "Top-right double tap!"
      label: "Top-Right Alert"

  # --- Middle Row ---

  mid-left:
    two-finger:
      action: media
      value: "prev"
      label: "Previous Track"

  center:
    two-finger:
      action: media
      value: "play-pause"
      label: "Play / Pause"
    triple:
      action: notify
      value: "TapCraft is alive and listening!"
      label: "Status Check"
    double:
      action: notify
      value: "Center double tap!"
      label: "Center Alert"

  mid-right:
    two-finger:
      action: media
      value: "next"
      label: "Next Track"

  # --- Bottom Row ---

  bot-left:
    double:
      action: notify
      value: "Bottom-left double tap!"
      label: "Bot-Left Alert"

  bot-mid:
    three-finger:
      action: clipboard
      value: "paste-plain"
      label: "Paste as Plain Text"

  bot-right:
    double:
      action: notify
      value: "Bottom-right double tap!"
      label: "Bot-Right Alert"
